version: '3.8'

services:
  web:
    build: .
    container_name: django_web
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 ecom_prj.wsgi:application
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: django_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: django_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    restart: unless-stopped

# Именованные тома: данные сохраняются при docker-compose down (без -v).
# НЕ используйте "docker-compose down -v" на продакшене — это удалит БД и медиафайлы.
volumes:
  static_volume:
  media_volume:
  postgres_data:   # данные PostgreSQL (товары, заказы, пользователи)
